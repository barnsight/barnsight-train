[DEFAULT]
# Path to the YOLO dataset configuration file
DATASET=datasets/training/data.yaml

# Path to initial weights (use smaller models like yolo11n.pt for weak PCs)
MODEL=yolo11n.pt

# Number of training epochs
EPOCHS=10

# Batch size per GPU/CPU (lower if running out of memory, 2 is good for weak PCs)
BATCH=2

# Number of dataloader workers (lower for weaker CPUs to prevent RAM/CPU locking)
WORKERS=2

# Image size (lower for faster training and less memory usage, e.g., 416 or 320)
IMGSZ=416
